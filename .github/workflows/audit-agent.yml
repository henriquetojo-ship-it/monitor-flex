name: Auditoria de Atendimento (Twilio + Claude)

# Audita uma amostra das conversas encerradas do dia, grava as notas na planilha
# Google e publica o resumo consolidado (Mensagem 2) no Slack.
#
# Roda 1x/dia, em dias úteis, logo após o último corte do monitor (18h BRT),
# para pegar o dia praticamente fechado.
#
# Horário (America/Sao_Paulo, UTC-3):
#   18h30 BRT -> 21:30 UTC
on:
  schedule:
    - cron: "30 21 * * 1-5"    # 18h30 BRT, seg-sex
  workflow_dispatch:            # permite rodar manualmente pela aba Actions
    inputs:
      sample:
        description: "Quantas conversas auditar nesta rodada"
        required: false
        default: "10"
      dry_run:
        description: "Auditar sem gravar na planilha nem publicar (true/false)?"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: audit-agent
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: America/Sao_Paulo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Escreve a conta de serviço do Google a partir do secret
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          printf '%s' "$GOOGLE_SA_JSON" > google-sa.json

      - name: Monta .env.local a partir dos secrets
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          TWILIO_SLACK_CHANNEL_ID: ${{ secrets.TWILIO_SLACK_CHANNEL_ID }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          AUDIT_SHEET_TAB: ${{ secrets.AUDIT_SHEET_TAB }}
        run: |
          cat > .env.local <<EOF
          TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
          TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID}
          GOOGLE_SA_FILE=google-sa.json
          SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
          TWILIO_SLACK_CHANNEL_ID=${TWILIO_SLACK_CHANNEL_ID}
          METABASE_URL=${METABASE_URL}
          METABASE_API_KEY=${METABASE_API_KEY}
          AUDIT_SHEET_TAB=${AUDIT_SHEET_TAB}
          EOF

      - name: Roda a auditoria e publica o resumo
        run: |
          SAMPLE="${{ github.event.inputs.sample || '10' }}"
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY_FLAG="--dry-run"; fi
          python3 scripts/audit_agent.py --sample "$SAMPLE" --post-slack $DRY_FLAG

      - name: Gera PDFs de auditoria e envia para Thais no Slack
        if: github.event.inputs.dry_run != 'true'
        run: python3 scripts/generate_audit_pdfs.py

      - name: Avisa no Slack se falhar
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.TWILIO_SLACK_CHANNEL_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          token = os.environ["SLACK_BOT_TOKEN"]
          channel = os.environ["SLACK_CHANNEL_ID"]
          run_url = os.environ["RUN_URL"]
          msg = (
              ":red_circle: *Auditoria de atendimento falhou*\n"
              "A execução automática não conseguiu rodar nesta janela.\n"
              f"Ver o erro: {run_url}"
          )
          body = json.dumps({"channel": channel, "text": msg, "mrkdwn": True}).encode()
          req = urllib.request.Request(
              "https://slack.com/api/chat.postMessage",
              data=body,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json; charset=utf-8",
              },
          )
          try:
              resp = json.load(urllib.request.urlopen(req))
              if not resp.get("ok"):
                  print(f"[ERRO] Slack respondeu: {resp}")
              else:
                  print(f"Alerta de falha publicado em {channel}")
          except Exception as e:
              print(f"[ERRO] Nao consegui avisar no Slack: {e}")
          PY

      - name: Limpa segredos em disco
        if: always()
        run: rm -f .env.local google-sa.json
